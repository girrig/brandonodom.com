name: Pull and Restart via SSH
on:
  push:
    branches: [ main ]  # Trigger on push to main branch
  workflow_dispatch:    # Allow manual triggering
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Add host key to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan "${{ secrets.DROPLET_IP }}" >> ~/.ssh/known_hosts
    
    - name: SSH, Pull and Restart
      # unzip: required by puppeteer >= 25 to extract chrome-headless-shell; Debian does not ship it by default
      # nvm: non-interactive SSH skips .bashrc, so nvm must be sourced explicitly and the default Node version activated
      run: |
        ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} '
          sudo apt-get install -y unzip &&
          cd ${{ secrets.DEPLOY_PATH }} &&
          git pull origin main &&
          cd brandonodom.com &&
          source ~/.nvm/nvm.sh &&
          nvm use default &&
          yarn install --frozen-lockfile &&
          yarn build &&
          (pm2 restart brandonodom.com || pm2 start yarn --name "brandonodom.com" -- start)
        '
