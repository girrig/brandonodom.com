name: Pull and Restart via SSH
on:
  push:
    branches: [ main ]  # Trigger on push to main branch
  workflow_dispatch:    # Allow manual triggering
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Setup SSH key
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
    
    - name: Add host key to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan "${{ secrets.DROPLET_IP }}" >> ~/.ssh/known_hosts
    
    - name: Install Puppeteer system dependencies
      run: |
        ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} '
          # Headless Chrome (used by Puppeteer for PDF generation) requires these shared libraries on Debian
          sudo apt-get update -q &&
          sudo apt-get install -y -q \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2 libxshmfence1
        '

    - name: SSH, Pull and Restart
      run: |
        ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_IP }} '
          cd ${{ secrets.DEPLOY_PATH }} &&
          git pull origin main &&
          cd brandonodom.com &&
          source ~/.nvm/nvm.sh &&
          nvm use default &&
          yarn install &&
          yarn build &&
          (pm2 restart brandonodom.com || pm2 start yarn --name "brandonodom.com" -- start)
        '
